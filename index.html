<style>

* { box-sizing:border-box; }
body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.45; }

.controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; align-items:center; }
button { border:0; border-radius:12px; padding:11px 15px; font-weight:700; cursor:pointer; background:var(--accent); color:white; box-shadow:0 6px 18px rgba(59,130,246,.2); }
button.secondary { background:#111827; }
button.light { background:#fff; color:#111827; border:1px solid var(--border); box-shadow:none; }
.progress { flex:1; min-width:240px; height:12px; background:#e5e7eb; border-radius:999px; overflow:hidden; }
.progress span { display:block; height:100%; width:0%; background:var(--accent); transition:width .2s; }
.scorebox { display:none; margin-top:16px; padding:14px 16px; border-radius:14px; background:#eef6ff; border:1px solid #bfdbfe; font-weight:700; }
main { max-width:980px; margin:0 auto; padding:22px; }
.question { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:18px; margin:0 0 16px; box-shadow:0 10px 28px rgba(17,24,39,.06); }
.qhead { display:flex; gap:10px; align-items:flex-start; margin-bottom:12px; }
.badge { flex:0 0 auto; background:#eef2ff; color:#3730a3; border-radius:999px; padding:4px 10px; font-size:.85rem; font-weight:800; }
.qtext { font-weight:750; }
.option { display:flex; gap:10px; align-items:flex-start; border:1px solid var(--border); border-radius:12px; padding:10px 12px; margin:8px 0; cursor:pointer; }
.option:hover { background:#f9fafb; }
.option input { margin-top:4px; }
.option.correct { border-color:rgba(21,115,71,.5); background:#ecfdf3; }
.option.incorrect { border-color:rgba(180,35,24,.45); background:#fef3f2; }
.feedback { display:none; margin-top:10px; font-weight:700; }
.feedback.ok { color:var(--ok); } .feedback.bad { color:var(--bad); }
.footer-note { color:var(--muted); font-size:.9rem; margin:24px 0; }
.unanswered { outline:3px solid rgba(245,158,11,.28); }
</style>

ación en el que un emisor no pretende que un receptor aprenda algo.", "Un acto de socialización en el que un emisor pretende que un receptor observe.", "Un acto de socialización en el que el emisor y el receptor se comunican."], "correct": [0]}, {"question": "Si consideramos establecer una definición de Enseñanza, mayormente podríamos estar de acuerdo en que enseñar es:", "options": ["Enseñar supone dar instrucción (conjunto de saberes, conocimientos, principios) a través de una serie de reglas, métodos a alguien (educando).", "Podemos entender por enseñar al conjunto de actividades de los miembros de una comunidad o grupo social encaminados a transmitir conocimientos culturales a otros miembros de esta cultura.", "Supone realizar un acto de comunicación entre emisor (Profesor/a) y un receptor (Alumno/a) entendiendo que en dicho acto existe una finalidad (que aprenda algo) y además hay un objetivo de comunicación.", "Todas son correctas."], "correct": [3]}, {"question": "Los diferentes contextos en los que el denominado Proceso A/E puede tener lugar, son:", "options": ["Formal", "No formal", "Informal", "Las anteriores respuestas son todas correctas"], "correct": [3]}, {"question": "En educación podemos entender por un contexto Formal, aquel en el que:", "options": ["Se incluyen la organización de acciones educativas o formativas que realizan entidades públicas o privadas, dirigidas a la capacitación o formación específica de las personas, bien para el mundo laboral-profesional, bien para su mejora individual.", "Ninguna de las anteriores respuestas son correctas", "Se contemplan todas aquellas acciones que, sin darse con intencionalidad educativa, tienen consecuencias educacionales sobre las personas.", "Hace referencia a la acción intencional de la Educación que los Estados o Naciones para la educación de sus ciudadanos."], "correct": [3]}, {"question": "Señala la respuesta correcta:", "options": ["La educación informal son hechos educativos no organizados que pue  diseño de las situaciones de aprendizaje, durante nuestra labor como docentes, debemos:", "options": ["Centrarnos en el diseño de las experiencias de aprendizaje obviando aquellas particularidades propias de cada alumno o alumna.", "Tener en cuenta las particularidades de nuestro alumnado en cuanto a su desarrollo de la personalidad (influenciado tanto por su genética como por las experiencias vividas).", "Diseñar experiencias de aprendizaje uniformes y estandarizadas para todo nuestro alumnado sin tener presentes sus particularidades o diferencias de personalidad.", "Ser conscientes de que las experiencias de aprendizaje apenas afectarán en el desarrollo de la personalidad de nuestro alumnado."], "correct": [1]}, {"question": "Los actores y elementos que conforman el proceso de enseñanza-aprendizaje en el contexto de la educación formal son:", "options": ["Las estrategias curriculares del profesorado, marcando la diferencia entre discentes y docentes.", "Los discentes y los docentes.", "El alumnado, el profesorado, las estrategias metodológicas y el objeto de aprendizaje.", "El conjunto de deberes que cada profesor debe asumir (objeto de aprendizaje)."], "correct": [2]}, {"question": "En educación, podemos entender por un contexto Formal aquel en el que:", "options": ["Hace referencia a la acción intencional de la Educación que los Estados o Naciones para la educación de sus ciudadanos.", "Ninguna de las anteriores respuestas son correctas.", "Se incluyen la organización de acciones educativas o formativas que realizan entidades públicas o privadas, dirigidas a la capacitación o formación específica de las personas, bien para el mundo laboral-profesional, bien para su mejora individual.", "Se contemplan todas aquellas acciones que, sin darse con intencionalidad educativa, tienen consecuencias educacionales sobre las personas."], "correct": [0]}, {"question": "Para Gagné (1987) una posible definición sobre Aprendizaje será (señala lo correcto):", "options": ["El ap  sentidos y que se hizo consciente a través de la atención."], "correct": [2]}, {"question": "Procesa la información espacial y visual, memoria visual y funciones no verbales. Se trata del hemisferio", "options": ["Derecho.", "Izquierdo.", "Periférico..", "Frontal."], "correct": [0]}, {"question": "Sobre la etapa de adolescencia:", "options": ["En la actualidad es claro el momento en el que dicha etapa inicia y finaliza.", "En la actualidad no existe un consenso claro sobre el momento en que inicia y finaliza.", "En un contexto informal de la educación, no es primordial tener en cuenta la etapa de la adolescencia.", "La OMS deja claro el inicio y el final de dicha etapa en un individuo. Existe una adolescencia inicial y final como únicas etapas delimitadas por la OMS."], "correct": [1]}, {"question": "Durante la adolescencia el modo en el que cada individuo va a lograr construir su identidad:", "options": ["No resultará tarea fácil. Y el aula, entre otros contextos, ofrece una gran oportunidad para ayudarles en dicho proceso.", "El logro de la identidad en la etapa de la adolescencia no resultará tarea fácil. Sin embargo, no debemos considerarla como uno de los objetivos más importantes en este momento del desarrollo de nuestro alumnado.", "Se desarrollará durante la etapa de la adolescencia temprana.", "Es una tarea relativamente sencilla que concluye de forma innata al finalizar la adolescencia."], "correct": [0]}, {"question": "Jung explica el desarrollo de la psique humana como un proceso en el que el individuo debe lograr el equilibrio entre dos tipos de actitud opuestas, a saber:", "options": ["Inconsciente personal e inconsciente colectivo.", "Empatía y motivación.", "Simpatía y Antipatía.", "Introversión y Extroversión."], "correct": [3]}, {"question": "Es aquella que nos hace recordar eventos, momentos que hemos vivido en un tiempo y un lugar dado. Nos referimos a:", "options": ["Memoria de trabajo.", "Memoria operativa.", "Memoria declarativa.", "Memoria e ía determinada: corolario", "options": ["Teoría de Carl Rogers.", "Teoría ‘Big Five’ de Robert McCrae y Paul Costa.", "Teoría de Carl Jung.", "Todas las teorías que aparecen a continuación, y otras, pueden ayudarnos en nuestra labor como docentes. Pues, en nuestra futura labor como docentes, no es recomendable centrarse exclusivamente en una."], "correct": [3]}, {"question": "Kelly presenta 11 Corolarios que dan explicación a su teoría de los constructos personales, ¿a qué corolario corresponde la siguiente afirmación? “Cada persona organiza y jerarquiza sus constructos personales de un modo particular y conveniente a sí mismo. Unos constructos predominan sobre otros de tal manera que las incoherencias entre ellos se minimizan”.", "options": ["Corolario de elección.", "Corolario de experiencia.", "Corolario de organización.", "Corolario de sociabilidad."], "correct": [2]}, {"question": "La relevancia de la motivación, atención y la memoria como unas funciones ejecutivas primordiales en el aula es un hecho. En qué medida podemos como docentes procurar el desarrollo de dichas funciones en nuestro alumnado. Señala la respuesta correcta.", "options": ["Tener presentes los conocimientos previos de nuestro alumnado. De tal manera que estos supongan un punto de partida para poder generar nuevos aprendizajes además de una mayor profundidad o complejidad sobre los que ya poseían.", "Practicar con aquellas informaciones o saberes que no sean especialmente significativos para el alumnado. A través de la toma de contacto regular y supervisada con nuevos conocimientos el alumno ampliará sus conocimientos previos.", "Plantear la acción educativa en base a la cuestión, interrogante o reto en el aula.", "Todas las recomendaciones anteriores son correctas."], "correct": [3]}, {"question": "Kelly presenta 11 Corolarios que dan explicación a su teoría de los constructos personales. A qué corolario corresponde la siguiente afirmación: las personas en la medida que son capaces de interp const letters = ['A','B','C','D'];
let graded = false;

function renderQuiz() {
  const root = document.getElementById('quiz');
  root.innerHTML = questions.map((q, i) => `
    <section class="question" id="q${i}" data-index="${i}">
      <div class="qhead"><span class="badge">${i+1}</span><div class="qtext">${escapeHtml(q.question)}</div></div>
      ${q.options.map((opt, j) => `
        <label class="option" id="q${i}o${j}">
          <input type="radio" name="q${i}" value="${j}" onchange="updateProgress()" />
          <span><strong>${letters[j]}.</strong> ${escapeHtml(opt)}</span>
        </label>`).join('')}
      <div class="feedback" id="fb${i}"></div>
    </section>`).join('');
  updateProgress();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function updateProgress() {
  const answered = questions.filter((_,i) => document.querySelector(`input[name="q${i}"]:checked`)).length;
  document.getElementById('progressBar').style.width = `${answered / questions.length * 100}%`;
  document.getElementById('progressText').textContent = `${answered}/${questions.length} respondidas`;
}

function gradeQuiz() {
  graded = true;
  let correctCount = 0, unanswered = 0;
  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const section = document.getElementById(`q${i}`);
    const fb = document.getElementById(`fb${i}`);
    section.classList.remove('unanswered');
    q.options.forEach((_,j) => {
      document.getElementById(`q${i}o${j}`).classList.remove('correct','incorrect');
    });
    q.correct.forEach(j => document.getElementById(`q${i}o${j}`).classList.add('correct'));
    if (!selected) {
      unanswered++;
      section.classList.add('unanswered');
      fb.className = 'feedback bad';
      fb.style.display = 'block';
      fb.textContent = 'Sin responder. Respuesta correcta: ' + q.correct.map(j => letters[j]).join(', ');
    } else if (q.correct.includes(Number(selected.value))) {
      correctCount++;
      fb.className = 'feedback ok';
      fb.style.display = 'block';
      fb.textContent = 'Correcta';
    } else {
      document.getElementById(`q${i}o${selected.value}`).classList.add('incorrect');
      fb.className = 'feedback bad';
      fb.style.display = 'block';
      fb.textContent = 'Incorrecta. Respuesta correcta: ' + q.correct.map(j => letters[j]).join(', ');
    }
  });
  const pct = Math.round(correctCount / questions.length * 100);
  const score = document.getElementById('score');
  score.style.display = 'block';
  score.textContent = `Resultado: ${correctCount}/${questions.length} correctas (${pct}%). Sin responder: ${unanswered}.`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showOnlyWrong() {
  if (!graded) gradeQuiz();
  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const ok = selected && q.correct.includes(Number(selected.value));
    document.getElementById(`q${i}`).style.display = ok ? 'none' : 'block';
  });
}

function resetQuiz() {
  document.querySelectorAll('input[type="radio"]').forEach(i => i.checked = false);
  document.querySelectorAll('.option').forEach(o => o.classList.remove('correct','incorrect'));
  document.querySelectorAll('.feedback').forEach(f => { f.style.display='none'; f.textContent=''; });
  document.querySelectorAll('.question').forEach(q => { q.style.display='block'; q.classList.remove('unanswered'); });
  document.getElementById('score').style.display='none';
  graded = false;
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderQuiz();
</script>
</body>
</html>
